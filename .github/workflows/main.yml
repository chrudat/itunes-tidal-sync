name: Weekly iTunes Update

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Update auf v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Update auf v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install google-auth google-api-python-client requests

      - name: Execute Script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python update_charts.py
