name: Weekly iTunes Email

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

# Diese Variable stellt sicher, dass GitHub den neuesten Motor (Node 24) nutzt
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requests
        run: pip install requests

      - name: Generate Charts File
        run: python update_charts.py

      - name: Send Mail
        # Hier nutzen wir v4 statt v3 für bessere Kompatibilität
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🎵 Deine iTunes Top 10 Charts"
          to: "sutadur@gmail.com"
          from: "GitHub Chart Bot"
          body: file://charts.txt
