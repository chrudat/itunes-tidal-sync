name: Weekly Music Update

on:
  schedule:
    - cron: '0 8 * * 1' # Jeden Montag um 08:00 UTC
  workflow_dispatch: # Erlaubt dir, es jederzeit manuell zu testen

jobs:
  build_and_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch iTunes Data
        run: python itunes_fetcher.py

      - name: Send Mail
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🎵 Dein kompaktes Musik-Update (iTunes)"
          to: "sutadur@gmail.com"
          from: "GitHub Music Bot"
          body: file://final_mail.txt
