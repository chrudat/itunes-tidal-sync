name: Weekly Music Update

on:
  schedule:
    - cron: '0 8 * * 1' # Montags 08:00 UTC
  workflow_dispatch: # Manueller Start möglich

env:
  # Verhindert Node.js Deprecation Warnungen in 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests spotipy

      - name: Fetch All Data
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          SPOTIPY_REFRESH_TOKEN: ${{ secrets.SPOTIPY_REFRESH_TOKEN }}
        run: |
          python itunes_fetcher.py
          python spotify_fav_fetcher.py
          python spotify_new_fetcher.py
          
          # Finale Datei erstellen
          echo "DEIN MUSIK-UPDATE VOM $(date +'%d.%m.%Y')" > final_mail.txt
          echo "=======================================" >> final_mail.txt
          cat part_itunes.txt >> final_mail.txt
          cat part_spotify_fav.txt >> final_mail.txt
          cat part_spotify_new.txt >> final_mail.txt

      - name: Send Mail
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🎵 Dein großes Musik-Update"
          to: "sutadur@gmail.com"
          from: "GitHub Music Bot"
          body: file://final_mail.txt          echo "=======================================" >> final_mail.txt
          cat part_itunes.txt >> final_mail.txt
          cat part_spotify_fav.txt >> final_mail.txt
          cat part_spotify_new.txt >> final_mail.txt

      - name: Send Mail
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🎵 Musik-Update: iTunes, Favs & New"
          to: "sutadur@gmail.com"
          from: "GitHub Music Bot"
          body: file://final_mail.txt
